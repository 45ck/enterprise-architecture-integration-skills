    {
      "id": "ci-cd-readiness-checker",
      "path": "skills/ci-cd-readiness-checker/SKILL.md",
      "purpose": "Check whether architecture, environments, governance, and testing are ready for reliable CI/CD and controlled releases.",
      "handoffs": [
        "environment-topology-planner",
        "container-vs-vm-advisor",
        "public-private-hybrid-cloud-selector"
      ]
    },
    {
      "id": "public-private-hybrid-cloud-selector",
      "path": "skills/public-private-hybrid-cloud-selector/SKILL.md",
      "purpose": "Select between public, private, and hybrid cloud options with explicit attention to compliance, integration, latency, and operational realities.",
      "handoffs": [
        "environment-topology-planner",
        "container-vs-vm-advisor",
        "ci-cd-readiness-checker"
      ]
    }
  ]
