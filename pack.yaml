        "message-bus-selector",
        "loose-coupling-checker",
        "environment-topology-planner"
      ]
    },
    {
      "id": "rpc-vs-message-pattern-selector",
      "path": "skills/rpc-vs-message-pattern-selector/SKILL.md",
